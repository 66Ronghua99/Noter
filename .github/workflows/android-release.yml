name: Android Release Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Build release APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
      SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
      SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
      SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run quality gate
        run: ./gradlew testDebugUnitTest lintDebug assembleRelease

      - name: Sign release APK
        if: ${{ env.SIGNING_KEYSTORE_BASE64 != '' }}
        run: |
          set -euo pipefail

          if [[ -z "$SIGNING_KEY_ALIAS" || -z "$SIGNING_STORE_PASSWORD" || -z "$SIGNING_KEY_PASSWORD" ]]; then
            echo "Signing keystore was provided, but one or more signing secrets are missing." >&2
            exit 1
          fi

          unsigned_apk="app/build/outputs/apk/release/app-release-unsigned.apk"
          signed_apk="app/build/outputs/apk/release/noter-release-signed.apk"
          keystore_path="$RUNNER_TEMP/noter-release-keystore.jks"
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"

          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          "$apksigner" sign \
            --ks "$keystore_path" \
            --ks-key-alias "$SIGNING_KEY_ALIAS" \
            --ks-pass "pass:$SIGNING_STORE_PASSWORD" \
            --key-pass "pass:$SIGNING_KEY_PASSWORD" \
            --out "$signed_apk" \
            "$unsigned_apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: noter-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag_name="$GITHUB_REF_NAME"
          if ! gh release view "$tag_name" >/dev/null 2>&1; then
            gh release create "$tag_name" \
              --title "$tag_name" \
              --notes "Automated Android release build for Noter."
          fi

          gh release upload "$tag_name" app/build/outputs/apk/release/*.apk --clobber
